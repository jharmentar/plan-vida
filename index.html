<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plan Vida Josué">
<meta name="theme-color" content="#534AB7">
<title>Plan de Vida — Josué Armenta</title>
<style>
:root {
  --purple:#534AB7; --purple-light:#EEEDFE; --purple-dark:#3C3489;
  --teal:#1D9E75; --blue:#378ADD; --coral:#D85A30;
  --pink:#D4537E; --gray:#D3D1C7; --amber:#EF9F27;
  --bg:#F8F7F5; --surface:#FFFFFF; --border:rgba(0,0,0,0.1);
  --text:#1a1a1a; --muted:#6b6b6b; --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}

.topbar{background:var(--purple);color:#fff;padding:14px 16px 12px;padding-top:calc(14px + env(safe-area-inset-top));position:sticky;top:0;z-index:100;}
.topbar h1{font-size:17px;font-weight:600;}
.topbar p{font-size:11px;opacity:0.75;margin-top:2px;}

.week-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.week-nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.week-nav-btn:active{background:var(--bg);}
.week-nav-btn.disabled{opacity:0.3;pointer-events:none;}
.week-nav-label{font-size:13px;font-weight:500;color:var(--text);text-align:center;flex:1;}
.week-nav-sub{font-size:11px;color:var(--muted);text-align:center;margin-top:1px;}
.tabs{display:flex;gap:6px;padding:10px 16px 8px;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:default;white-space:nowrap;opacity:0.35;}
.tab.active{background:var(--purple-light);border-color:var(--purple);color:var(--purple-dark);opacity:1;}

.progress-section{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.progress-top{display:flex;justify-content:space-between;margin-bottom:5px;}
.progress-lbl{font-size:12px;color:var(--muted);}
.progress-pct{font-size:12px;font-weight:600;color:var(--text);}
.progress-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .3s,background .3s;}

.day-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border);padding:0 6px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:8px 10px;cursor:pointer;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:44px;}
.day-tab.active .day-name{color:var(--purple);}
.day-tab.active{border-bottom-color:var(--purple);}
.day-name{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;}
.day-num{font-size:11px;color:var(--muted);white-space:nowrap;padding:1px 5px;border-radius:8px;}
.day-tab.today .day-num{background:var(--purple);color:#fff;}
.day-tab.active .day-name{color:var(--purple);}
.day-tab.active .day-num{color:var(--purple);}
.day-tab.today.active .day-num{background:var(--purple);color:#fff;}
.day-tab.rest .day-name{color:var(--purple-dark);}

.tip{margin:10px 16px 0;background:var(--purple-light);border-radius:var(--radius-sm);border-left:3px solid var(--purple);padding:9px 12px;font-size:12px;color:var(--purple-dark);line-height:1.5;}

.block-list{padding:10px 16px;display:flex;flex-direction:column;gap:7px;}
.section-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;padding:6px 0 2px;}
.block-item{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:var(--radius);padding:11px 14px;border:1px solid var(--border);cursor:pointer;-webkit-user-select:none;user-select:none;transition:opacity .2s;}
.block-item.passive{cursor:default;}
.block-item.done{opacity:0.4;}
.block-item.done .check-circle{background:var(--teal);border-color:var(--teal);}
.block-item.done .check-circle svg{display:block;}
.color-bar{width:4px;height:38px;border-radius:2px;flex-shrink:0;}
.block-info{flex:1;min-width:0;}
.block-name{font-size:14px;font-weight:500;}
.block-time{font-size:12px;color:var(--muted);margin-top:1px;}
.check-circle{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.check-circle svg{display:none;width:13px;height:13px;}
.delete-btn{display:none;width:26px;height:26px;border-radius:50%;background:#FCEBEB;border:none;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#A32D2D;}
.block-item.custom .delete-btn{display:flex;}

.reset-wrap{padding:4px 16px 20px;}
.reset-btn{width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--muted);cursor:pointer;}

/* FAB */
.fab{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));right:18px;width:52px;height:52px;border-radius:50%;background:var(--purple);color:#fff;font-size:28px;border:none;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(83,74,183,0.4);transition:transform .15s;}
.fab:active{transform:scale(0.92);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:flex;align-items:flex-end;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;padding-bottom:calc(16px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);}
.modal-title{font-size:16px;font-weight:600;}
.modal-close{font-size:20px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;line-height:1;}
.modal-body{padding:14px 20px;display:flex;flex-direction:column;gap:14px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;}
.field input[type=text],.field input[type=time]{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg);color:var(--text);width:100%;outline:none;}
.field input:focus{border-color:var(--purple);}

/* Color pills */
.color-picker{display:flex;gap:6px;flex-wrap:wrap;}
.color-opt{display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 11px;border-radius:20px;border:2px solid transparent;background:var(--bg);transition:all .15s;}
.color-opt.selected{border-color:var(--text);background:var(--surface);}
.color-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;pointer-events:none;}
.color-label{font-size:12px;font-weight:500;color:var(--muted);pointer-events:none;}
.color-opt.selected .color-label{color:var(--text);}

/* Day picker */
.day-picker{display:flex;gap:5px;flex-wrap:wrap;}
.day-opt{padding:6px 11px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;}
.day-opt.selected{background:var(--purple-light);border-color:var(--purple);color:var(--purple-dark);}

.modal-footer{display:flex;gap:10px;padding:12px 20px 0;}
.btn-cancel{flex:1;padding:12px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;font-size:14px;color:var(--muted);cursor:pointer;}
.btn-save{flex:2;padding:12px;border-radius:var(--radius);border:none;background:var(--purple);color:#fff;font-size:14px;font-weight:600;cursor:pointer;}

.install-banner{margin:10px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;display:flex;gap:10px;align-items:flex-start;}
.install-banner.hidden{display:none;}
.install-icon{font-size:20px;flex-shrink:0;}
.install-text{flex:1;}
.install-text strong{font-size:13px;font-weight:600;display:block;margin-bottom:2px;}
.install-text p{font-size:12px;color:var(--muted);line-height:1.4;}
.install-close{font-size:16px;color:var(--muted);cursor:pointer;padding:0 0 0 8px;}
</style>
<noscript><style>.tabs .tab:first-child{background:#EEEDFE;border-color:#7F77DD;color:#3C3489;}</style></noscript>
</head>
<body>

<div class="topbar">
  <h1>Plan de Vida — Josué Armenta</h1>
  <p id="topbar-sub">Detectando turno...</p>
</div>

<div id="install-banner" class="install-banner">
  <div class="install-icon">📲</div>
  <div class="install-text">
    <strong>Instalar en pantalla de inicio</strong>
    <p>Compartir → Agregar a pantalla de inicio</p>
  </div>
  <div class="install-close" onclick="dismissBanner()">✕</div>
</div>

<div class="week-nav">
  <button class="week-nav-btn" id="btn-prev" onclick="changeWeek(-1)">&#8249;</button>
  <div>
    <div class="week-nav-label" id="week-nav-label">Esta semana</div>
    <div class="week-nav-sub" id="week-nav-sub"></div>
  </div>
  <button class="week-nav-btn" id="btn-next" onclick="changeWeek(1)">&#8250;</button>
</div>
<div class="tabs">
  <div class="tab" id="tab-morning">Mañana</div>
  <div class="tab" id="tab-mid">Tarde</div>
  <div class="tab" id="tab-night">Noche</div>
</div>

<div class="progress-section">
  <div class="progress-top">
    <span class="progress-lbl" id="prog-lbl">0 de 0 actividades</span>
    <span class="progress-pct" id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="day-tabs" id="day-tabs"></div>
<div id="tip" class="tip"></div>
<div class="block-list" id="block-list"></div>

<div class="reset-wrap">
  <button class="reset-btn" onclick="resetWeek()">Reiniciar semana</button>
</div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nueva actividad</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">Nombre</label>
        <input type="text" id="new-name" placeholder="Ej: Lectura técnica" maxlength="40">
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Inicio</label>
          <input type="time" id="new-start" value="08:00">
        </div>
        <div class="field">
          <label class="field-label">Fin</label>
          <input type="time" id="new-end" value="09:00">
        </div>
      </div>
      <div class="field">
        <label class="field-label">Categoría</label>
        <div class="color-picker" id="color-picker">
          <div class="color-opt selected" data-type="study"><div class="color-dot" style="background:#1D9E75"></div><span class="color-label">Estudio</span></div>
          <div class="color-opt" data-type="job"><div class="color-dot" style="background:#378ADD"></div><span class="color-label">Empleo</span></div>
          <div class="color-opt" data-type="exercise"><div class="color-dot" style="background:#D85A30"></div><span class="color-label">Ejercicio</span></div>
          <div class="color-opt" data-type="social"><div class="color-dot" style="background:#D4537E"></div><span class="color-label">Social</span></div>
          <div class="color-opt" data-type="work"><div class="color-dot" style="background:#534AB7"></div><span class="color-label">Trabajo</span></div>
          <div class="color-opt" data-type="sleep"><div class="color-dot" style="background:#D3D1C7"></div><span class="color-label">Otro</span></div>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Días</label>
        <div class="day-picker" id="day-picker">
          <div class="day-opt selected" data-day="0">Lun</div>
          <div class="day-opt" data-day="1">Mar</div>
          <div class="day-opt" data-day="2">Mié</div>
          <div class="day-opt" data-day="3">Jue</div>
          <div class="day-opt" data-day="4">Vie</div>
          <div class="day-opt" data-day="5">Sáb</div>
          <div class="day-opt" data-day="6">Dom</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveActivity()">Agregar</button>
    </div>
  </div>
</div>

<script>
var COLORS = {
  work:'#534AB7', study:'#1D9E75', job:'#378ADD',
  exercise:'#D85A30', social:'#D4537E', sleep:'#D3D1C7', prep:'#EF9F27'
};
var IS_REST = [false,false,false,true,false,false,false];
var SHORT = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
var MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

// --- Real calendar week ---
var weekOffset = 0; // 0 = current week, 1 = next, -1 = previous

function getWeekDates(offset) {
  offset = offset || 0;
  var today = new Date();
  var dow = today.getDay();
  var monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push({
      short: SHORT[i],
      num: d.getDate(),
      month: MONTHS[d.getMonth()],
      year: d.getFullYear(),
      fullDate: d,
      isToday: d.toDateString() === today.toDateString()
    });
  }
  return days;
}
var WEEK = getWeekDates(0);
var TODAY_IDX = WEEK.findIndex(function(d){ return d.isToday; });

// --- Schedule data ---

var normalMid = [

    tip: 'Mié y Vie: turno extra 06:00–15:40. El jueves es tu día ancla: estudio largo + empleo + familia.',

    ]
  },

    tip: 'Mié y Vie: turno extra 15:40–01:15. Duermes hasta las 10:00. Las mañanas son tu ventana productiva.',

    ]
  },
  mid: {

      [{type:'sleep',sh:0,sm:0,eh:8,em:0,label:'Sueño'},{type:'study',sh:8,sm:0,eh:10,em:0,label:'Estudio DE'},{type:'exercise',sh:10,sm:0,eh:11,em:30,label:'Gym'},{type:'prep',sh:11,sm:30,eh:12,em:0,label:'Ducha / arreglo'},{type:'job',sh:12,sm:0,eh:13,em:0,label:'LinkedIn'},{type:'prep',sh:15,sm:0,eh:15,em:40,label:'Preparación salida'},{type:'work',sh:15,sm:40,eh:25,em:15,label:'Trabajo (extra)'}],

// --- Auto-detect quincena ---
// Cycle: Noche(0) -> Tarde(1) -> Mañana(2), repeating every 3 quincenas
// Anchor: Jan 1-15 2026 = Noche (index 0)
var CYCLE = ['night', 'mid', 'morning'];
var ANCHOR_Y = 2026, ANCHOR_M = 1;  // Feb 2026 anchor

function calcShift(dateObj) {
  var y = dateObj.getFullYear();
  var m = dateObj.getMonth();
  var day = dateObj.getDate();
  var monthsDiff = (y - ANCHOR_Y) * 12 + (m - ANCHOR_M);
  var qInMonth = day <= 15 ? 0 : 1;
  var total = monthsDiff * 2 + qInMonth;
  return CYCLE[((total % 3) + 3) % 3];
}

var AUTO_SHIFT = calcShift(new Date());

var curShift = AUTO_SHIFT;
var curDay = TODAY_IDX >= 0 ? TODAY_IDX : 0;
var checked = {};
var customActs = {};
var selectedType = 'study';

function hm(h,m){ return ('0'+(h%24)).slice(-2)+':'+('0'+(m||0)).slice(-2); }
function pkey(s){ return 'plan_vida_v2_'+s; }
function ckey(s){ return 'custom_v2_'+s; }

function loadChecked(s){ try{ return JSON.parse(localStorage.getItem(pkey(s))||'{}'); }catch(e){ return {}; } }
function saveChecked(){ try{ localStorage.setItem(pkey(curShift),JSON.stringify(checked)); }catch(e){} }
function loadCustom(s){ try{ return JSON.parse(localStorage.getItem(ckey(s))||'{}'); }catch(e){ return {}; } }
function saveCustom(){ try{ localStorage.setItem(ckey(curShift),JSON.stringify(customActs)); }catch(e){} }

function bid(di,bi){ return di+'_'+bi; }

function shiftForDay(weekDay) {
  return calcShift(weekDay.fullDate);
}

function renderDayTabs(){
  var el = document.getElementById('day-tabs');
  el.innerHTML = '';
  WEEK.forEach(function(d,i){
    var btn = document.createElement('div');
    var cls = 'day-tab';
    if(IS_REST[i]) cls += ' rest';
    if(i === curDay) cls += ' active';
    if(d.isToday) cls += ' today';
    btn.className = cls;
    var nameEl = document.createElement('span');
    nameEl.className = 'day-name';
    nameEl.textContent = IS_REST[i] ? d.short+' 🛌' : d.short;
    var numEl = document.createElement('span');
    numEl.className = 'day-num';
    numEl.textContent = d.num+' '+d.month;
    btn.appendChild(nameEl);
    btn.appendChild(numEl);
    btn.addEventListener('click', (function(idx){ return function(){
      curDay = idx;
      // Switch shift if this day belongs to a different quincena
      var dayShift = shiftForDay(WEEK[idx]);
      if(dayShift !== curShift) {
        curShift = dayShift;
        checked = loadChecked(curShift);
        customActs = loadCustom(curShift);
        updateShiftTabs();
      }
      renderDayTabs();
      renderBlocks();
    }; })(i));
    el.appendChild(btn);
  });
}

function renderBlocks(){
  var list = document.getElementById('block-list');
  list.innerHTML = '';
  var blocks = SHIFTS[curShift].schedule[curDay];

  blocks.forEach(function(b,bi){
    var passive = b.type==='sleep'||b.type==='prep';
    var id = bid(curDay,bi);
    var done = !!checked[id];
    var cross = b.eh>=24;
    var time = hm(b.sh,b.sm)+' – '+hm(b.eh,b.em)+(cross?' (+1)':'');

    var item = document.createElement('div');
    item.className = 'block-item'+(passive?' passive':'')+(done?' done':'');
    item.dataset.id = id;

    var bar = document.createElement('div');
    bar.className = 'color-bar';
    bar.style.background = COLORS[b.type];

    var info = document.createElement('div');
    info.className = 'block-info';
    var nm = document.createElement('div');
    nm.className = 'block-name';
    nm.textContent = b.label;
    var tm = document.createElement('div');
    tm.className = 'block-time';
    tm.textContent = time;
    info.appendChild(nm);
    info.appendChild(tm);

    item.appendChild(bar);
    item.appendChild(info);

    if(!passive){
      var circle = document.createElement('div');
      circle.className = 'check-circle';
      circle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      item.appendChild(circle);
      item.addEventListener('click', (function(i,b){ return function(){ checked[i]=!checked[i]; saveChecked(); item.classList.toggle('done',!!checked[i]); updateProgress(); }; })(id,bi));
    }
    list.appendChild(item);
  });

  // Custom activities
  var customs = customActs[curDay] || [];
  if(customs.length > 0){
    var sep = document.createElement('div');
    sep.className = 'section-label';
    sep.textContent = 'Actividades personalizadas';
    list.appendChild(sep);
  }
  customs.forEach(function(a){
    var cid = 'c_'+curDay+'_'+a.id;
    var done = !!checked[cid];
    var cross = a.eh>=24;
    var time = hm(a.sh,a.sm)+' – '+hm(a.eh,a.em)+(cross?' (+1)':'');

    var item = document.createElement('div');
    item.className = 'block-item custom'+(done?' done':'');

    var bar = document.createElement('div');
    bar.className = 'color-bar';
    bar.style.background = COLORS[a.type]||'#888';

    var info = document.createElement('div');
    info.className = 'block-info';
    var nm = document.createElement('div');
    nm.className = 'block-name';
    nm.textContent = a.label;
    var tm = document.createElement('div');
    tm.className = 'block-time';
    tm.textContent = time;
    info.appendChild(nm);
    info.appendChild(tm);

    var circle = document.createElement('div');
    circle.className = 'check-circle';
    circle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

    var del = document.createElement('button');
    del.className = 'delete-btn';
    del.textContent = '✕';
    del.addEventListener('click', (function(aid){ return function(e){ e.stopPropagation(); deleteCustom(aid); }; })(a.id));

    item.appendChild(bar);
    item.appendChild(info);
    item.appendChild(circle);
    item.appendChild(del);

    item.addEventListener('click', (function(id){ return function(){ checked[id]=!checked[id]; saveChecked(); item.classList.toggle('done',!!checked[id]); updateProgress(); }; })(cid));
    list.appendChild(item);
  });
}

function deleteCustom(aid){
  if(!customActs[curDay]) return;
  customActs[curDay] = customActs[curDay].filter(function(a){ return a.id!==aid; });
  saveCustom();
  renderBlocks();
  updateProgress();
}

function updateProgress(){
  var total=0, done=0;
  SHIFTS[curShift].schedule.forEach(function(day,di){
    day.forEach(function(b,bi){
      if(b.type==='sleep'||b.type==='prep') return;
      total++;
      if(checked[bid(di,bi)]) done++;
    });
  });
  Object.keys(customActs).forEach(function(di){
    (customActs[di]||[]).forEach(function(a){
      total++;
      if(checked['c_'+di+'_'+a.id]) done++;
    });
  });
  var pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-lbl').textContent = done+' de '+total+' actividades completadas';
  var fill = document.getElementById('prog-fill');
  fill.style.background = pct===100 ? '#534AB7' : pct>=60 ? '#1D9E75' : '#378ADD';
}


function updateWeekNav() {
  var first = WEEK[0], last = WEEK[6];
  var label = weekOffset === 0 ? 'Esta semana'
    : weekOffset === 1 ? 'Próxima semana'
    : weekOffset === -1 ? 'Semana pasada'
    : weekOffset > 0 ? '+' + weekOffset + ' semanas'
    : weekOffset + ' semanas';
  document.getElementById('week-nav-label').textContent = label;
  document.getElementById('week-nav-sub').textContent =
    first.num + ' ' + first.month + ' – ' + last.num + ' ' + last.month;
  document.getElementById('btn-prev').classList.toggle('disabled', weekOffset <= -8);
  document.getElementById('btn-next').classList.toggle('disabled', weekOffset >= 12);
}

function updateShiftTabs() {
  ['morning', 'mid', 'night'].forEach(function(k) {
    document.getElementById('tab-' + k).classList.toggle('active', k === curShift);
  });
  document.getElementById('topbar-sub').textContent =
    SHIFTS[curShift].label + ' · ' + WEEK[0].num + ' ' + WEEK[0].month + ' – ' + WEEK[6].num + ' ' + WEEK[6].month;
  document.getElementById('tip').textContent = SHIFTS[curShift].tip;
}

function changeWeek(dir) {
  weekOffset += dir;
  WEEK = getWeekDates(weekOffset);
  TODAY_IDX = WEEK.findIndex(function(d) { return d.isToday; });
  var anchorDay = TODAY_IDX >= 0 ? WEEK[TODAY_IDX] : WEEK[0];
  curShift = shiftForDay(anchorDay);
  checked = loadChecked(curShift);
  customActs = loadCustom(curShift);
  curDay = TODAY_IDX >= 0 ? TODAY_IDX : 0;
  updateWeekNav();
  updateShiftTabs();
  renderDayTabs();
  renderBlocks();
  updateProgress();
}

function setShift(s){
  curShift = s;
  curDay = TODAY_IDX >= 0 ? TODAY_IDX : 0;
  checked = loadChecked(s);
  customActs = loadCustom(s);
  updateWeekNav();
  updateShiftTabs();
  renderDayTabs();
  renderBlocks();
  updateProgress();
}

function resetWeek(){
  if(!confirm('¿Reiniciar el progreso de esta quincena?')) return;
  checked={};
  saveChecked();
  document.querySelectorAll('.block-item.done').forEach(function(el){ el.classList.remove('done'); });
  updateProgress();
}

// Modal
function openModal(){
  selectedType='study';
  document.getElementById('new-name').value='';
  document.getElementById('new-start').value='08:00';
  document.getElementById('new-end').value='09:00';
  document.querySelectorAll('.color-opt').forEach(function(el){
    el.classList.toggle('selected', el.dataset.type==='study');
  });
  document.querySelectorAll('.day-opt').forEach(function(el){
    el.classList.toggle('selected', parseInt(el.dataset.day)===curDay);
  });
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(function(){ document.getElementById('new-name').focus(); }, 100);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.add('hidden');
}

document.getElementById('modal-overlay').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

// Event delegation for color and day pickers
document.addEventListener('click', function(e){
  var co = e.target.closest('.color-opt');
  if(co){
    document.querySelectorAll('.color-opt').forEach(function(el){ el.classList.remove('selected'); });
    co.classList.add('selected');
    selectedType = co.dataset.type;
  }
  var dopt = e.target.closest('.day-opt');
  if(dopt) dopt.classList.toggle('selected');
});

function saveActivity(){
  var name = document.getElementById('new-name').value.trim();
  var startStr = document.getElementById('new-start').value;
  var endStr = document.getElementById('new-end').value;
  var selDays = [];
  document.querySelectorAll('.day-opt.selected').forEach(function(el){ selDays.push(parseInt(el.dataset.day)); });

  if(!name){ document.getElementById('new-name').focus(); return; }
  if(!startStr||!endStr){ alert('Ingresa horario de inicio y fin'); return; }
  if(selDays.length===0){ alert('Selecciona al menos un día'); return; }

  var sp = startStr.split(':').map(Number);
  var ep = endStr.split(':').map(Number);
  var sh=sp[0], sm=sp[1], eh=ep[0], em=ep[1];
  if(eh<sh||(eh===sh&&em<=sm)) eh+=24;

  var id = 'a'+Date.now();
  selDays.forEach(function(di){
    if(!customActs[di]) customActs[di]=[];
    customActs[di].push({id:id+'_'+di, label:name, sh:sh, sm:sm, eh:eh, em:em, type:selectedType});
  });
  saveCustom();
  closeModal();
  if(selDays.indexOf(curDay)>=0) renderBlocks();
  updateProgress();
}

function dismissBanner(){
  document.getElementById('install-banner').classList.add('hidden');
  try{ localStorage.setItem('banner_dismissed','1'); }catch(e){}
}

if(localStorage.getItem('banner_dismissed')||window.navigator.standalone){
  document.getElementById('install-banner').classList.add('hidden');
}

// Init — auto-detect current quincena
setShift(AUTO_SHIFT);
</script>
